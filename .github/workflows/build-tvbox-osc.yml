name: Build TVBOX APP

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      rebuild:
        description: "忽略构建记录以重新构建"
        required: false
        type: boolean
      donotpublish:
        description: "构建后不提交发布新版"
        required: false
        type: boolean
      crosswalk:
        description: "是否修改crosswalk源"
        required: false
        type: boolean
      testOption:
        description: "arm64支持 不支持ijk解码"
        required: false
        type: boolean
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - userName: q215613905
            repoName: TVBoxOS
            branchName: main

          - userName: takagen99
            repoName: Box
            branchName: main
            java_ver: 17

          - userName: FongMi
            repoName: TV
            branchName: fongmi
            java_ver: 17

          - userName: AoThen
            repoName: TV-APK
            branchName: dev
            java_ver: 17

          # - userName: mlabalabala
          #   repoName: box
          #   branchName: main

          #会闪退
          # - userName: chengxue2020
          #   repoName: takagen99
          #   branchName: main
          #   java_ver: 17

          #无法编译
          # - userName: chengxue2020
          #   repoName: q215613905-Tbox
          #   branchName: main
          #   java_ver: 17

          #自定义
          - userName: AoThen
            repoName: ABox
            branchName: dev
            # java_ver: 17

          - userName: AoThen
            repoName: XBox
            branchName: dev
            java_ver: 17

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 2

      - name: Check New Commit
        run: |
          upStream=https://github.com/${{ matrix.userName }}/${{ matrix.repoName }}
          echo "upStream=$upStream" >> $GITHUB_ENV
          commit=$(curl -sL $upStream/commits/${{ matrix.branchName }} |grep -o "/${{ matrix.userName }}/${{ matrix.repoName }}/commit/[a-z0-9]\+" |head -1 | cut -d\/ -f5)
          if [[ -z "${commit}" ]]; then
            commit=$(curl -s "https://api.github.com/repos/${{ matrix.userName }}/${{ matrix.repoName }}/commits/${{ matrix.branchName }}?per_page=1" | jq -r '.sha' )
          fi
          if ! grep -q "$commit" README.md || [ "${{ inputs.rebuild }}" == "true" ]; then
            echo "commit=$commit" >> $GITHUB_ENV
            echo "commitS=${commit:0:7}" >> $GITHUB_ENV
          fi
          echo "commit=$commit"

      - name: Checkout Source Code
        if: ${{ env.commit }}
        run: |
          git clone ${{ env.upStream }} TVBoxOSC
          cd TVBoxOSC
          git checkout ${{ env.commit }}
          echo "tag=$(git log --date=format:'%Y%m%d-%H%M' --pretty=format:%cd ${{ env.commitS }} -1)" >> $GITHUB_ENV
          echo "tagx=${{ matrix.userName }}-${{ matrix.repoName }}-${{ matrix.branchName }}-$(git log --date=format:'%Y%m%d-%H%M' --pretty=format:%cd ${{ env.commitS }} -1)" >> $GITHUB_ENV
          if [[ "${{ matrix.userName }}" == "xinyi1984" && "${{ matrix.repoName }}" == "TV" && "${{ matrix.branchName }}" == "fongmi" ]]; then
            sed -i 's|/home/runner/work/TVBox-TV/TVBox-TV|${{ github.workspace }}|g' settings.gradle
          fi

      - name: Extra Modify
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          echo '修改VersionName'
          if [ "${{ matrix.userName }}" == "takagen99" ]; then
            # 进行 sed 修改
            sed -i 's/\.concat(buildTime())/ +\"${{ env.tag }}\"/g' app/build.gradle 
            # 目前关于页面没有合并我的分支
            sed -i "/android:text=/s#=\"#=\"${{ env.tag }}\\\\n\\\\n#" app/src/main/res/layout/dialog_about.xml
          elif [ "${{ matrix.userName }}" == "FongMi" ] || [ "${{ matrix.repoName }}" == "TV-APK" ] ; then
            sed -i 's/TeamNewPipe/teamnewpipe/g' app/build.gradle
            sed -i '/buildPython("D:\/Programs\/Python\/Python38\/python.exe")/d' pyramid/build.gradle || true
            if [ "${{ matrix.userName }}" == "FongMi" ]; then
              # 方案A: 使用 FongMi 的 media3 fork (release-1.10.1-fongmi 分支)
              # 克隆 fork 到同级目录，通过 project 依赖替代 Maven 依赖
              git clone --branch release-1.10.1-fongmi --depth 1 https://github.com/FongMi/media.git ../media
              mkdir -p app/src/main/java/androidx/media3/exoplayer/source/preload
              mkdir -p app/src/main/java/androidx/media3/ui
              mkdir -p app/src/main/java/androidx/media3/mpvplayer
              # 只复制 fork 不包含的存根类
              cp -r ${{ github.workspace }}/patches/fongmi/app/src/main/java/androidx/media3/exoplayer/source/preload/* app/src/main/java/androidx/media3/exoplayer/source/preload/
              cp -r ${{ github.workspace }}/patches/fongmi/app/src/main/java/androidx/media3/ui/PlayerSeekView.java app/src/main/java/androidx/media3/ui/
              cp -r ${{ github.workspace }}/patches/fongmi/app/src/main/java/androidx/media3/mpvplayer/* app/src/main/java/androidx/media3/mpvplayer/
              # 在 settings.gradle 末尾添加 media3 fork 模块（完整列表，满足内部交叉引用）
              echo 'gradle.ext.androidxMediaSettingsDir = file("../media").absolutePath' >> settings.gradle
              echo 'gradle.ext.androidxMediaModulePrefix = "media3-"' >> settings.gradle
              # kopli: moduleName=media3-lib-{hyphen}, dir=libraries/{underscore}
              # eraldi: media3-test-utils → libraries/test_utils
              for entry in \
                "common:common" "common-ktx:common_ktx" "container:container" \
                "session:session" \
                "exoplayer:exoplayer" "exoplayer-dash:exoplayer_dash" "exoplayer-hls:exoplayer_hls" \
                "exoplayer-rtsp:exoplayer_rtsp" "exoplayer-smoothstreaming:exoplayer_smoothstreaming" \
                "ui:ui" "ui-danmaku:ui_danmaku" "ui-leanback:ui_leanback" \
                "database:database" \
                "datasource:datasource" "datasource-okhttp:datasource_okhttp" \
                "extractor:extractor" \
                "decoder:decoder" "decoder-ffmpeg:decoder_ffmpeg" "decoder-flac:decoder_flac" "decoder-vp9:decoder_vp9" \
              ; do
                name="${entry%%:*}"
                dir="${entry##*:}"
                echo "include ':media3-lib-${name}'" >> settings.gradle
                echo "project(':media3-lib-${name}').projectDir = new File(rootDir, '../media/libraries/${dir}')" >> settings.gradle
              done
              echo "include ':media3-test-utils'" >> settings.gradle
              echo "project(':media3-test-utils').projectDir = new File(rootDir, '../media/libraries/test_utils')" >> settings.gradle
              # 替换 app/build.gradle 中的 Maven 依赖为 project 依赖
              for dep in common session ui exoplayer extractor datasource database datasource-okhttp; do
                accessor="${dep//-/.}"
                sed -i "/^    coreLibraryDesugaring libs.desugar/i\    implementation project(':media3-lib-${dep}')" app/build.gradle
              done
              # 在 fork 的 DefaultRenderersFactory 中添加 setFfmpegAudioPrefer/setFfmpegVideoPrefer
              sed -i '/^  @Override/i\  public DefaultRenderersFactory setFfmpegAudioPrefer(boolean prefer) { return this; }\n  public DefaultRenderersFactory setFfmpegVideoPrefer(boolean prefer) { return this; }\n' ../media/libraries/exoplayer/src/main/java/androidx/media3/exoplayer/DefaultRenderersFactory.java
              # 仅保留 debug view 的 sed（fork 的 PlayerView 没有这些方法）
              sed -i 's/getPlayerView()\.isDebugViewVisible()/false/g' app/src/main/java/com/fongmi/android/tv/ui/activity/PlaybackActivity.java
              sed -i 's/getPlayerView()\.toggleDebugView();/\/\/ removed by patch/' app/src/main/java/com/fongmi/android/tv/ui/activity/PlaybackActivity.java
              sed -i 's/getPlayerView()\.hideDebugView();/\/\/ removed by patch/' app/src/main/java/com/fongmi/android/tv/ui/activity/PlaybackActivity.java
            fi
          elif [ "${{ matrix.userName }}" == "chengxue2020" ]; then
            echo '空'
          elif [ "${{ matrix.userName }}" == "mlabalabala" ]; then
            sed -i "/versionName/s#[0-9a-zA-Z_\.\'\"-]\+\$#\'${{ env.tag }}\'#" app/build.gradle
            sed -i "/android:text=/s#=\"#=\"${{ env.tag }}\\\\n\\\\n#" app/src/main/res/layout/dialog_about.xml
          elif [ "${{ matrix.userName }}" == "xinyi1984" ]; then
            # 进行 sed 修改
            sed -i 's/\.concat(buildTime())/ +\"${{ env.tag }}\"/g' app/build.gradle 
          elif [ "${{ matrix.userName }}" == "AoThen" ] ; then
            # 进行 sed 修改
            sed -i 's/\.concat(buildTime())/ +\"${{ env.tag }}\"/g' app/build.gradle 
            sed -i "/android:text=/s#=\"#=\"${{ env.tagx }}\\\\n\\\\n#" app/src/main/res/layout/dialog_about.xml
          else
             sed -i "/versionName/s#[0-9a-zA-Z_\.\'\"-]\+\$#\'${{ env.tag }}\'#" app/build.gradle
             sed -i "/android:text=/s#=\"#=\"${{ env.tag }}\\\\n\\\\n#" app/src/main/res/layout/dialog_about.xml
          fi
        continue-on-error: true

      - name: crosswalk Modify
        if: ${{ env.commit && inputs.crosswalk }}
        working-directory: TVBoxOSC
        run: |
          echo 'crosswalk源，防挂'
          if grep -q 'crosswalk' build.gradle; then
            sed -i "/crosswalk/a\        maven { url 'https://o0halflife0o.github.io/crosswalk/releases/crosswalk/android/maven2' }" build.gradle
          else
            sed -i "/jitpack.io/a\        maven { url 'https://o0halflife0o.github.io/crosswalk/releases/crosswalk/android/maven2' }" build.gradle
          fi


      # - name: Compress Source Code
      #   if: ${{ env.commit }}
      #   working-directory: TVBoxOSC
      #   run: |
      #     #zip -q -x ".git/*" -x  ".github/*" -r sourceCode-${{ env.commitS }}.zip .
      #     tar -cJf sourceCode-${{ env.commitS }}.tar.xz --exclude=.git --exclude=.github *

      - name: Option For Test
        if: ${{ inputs.testOption }}
        working-directory: TVBoxOSC
        run: |
          #添加arm64支持，不支持ijk解码
          sed -i "/armeabi-v7a[\'\"]$/s#\$#, 'arm64-v8a'#" app/build.gradle
          sed -i "/armeabi-v7a[\'\"]$/s#\$#, 'arm64-v8a'#" player/build.gradle

      - name: Setup Python
        if: ${{ (matrix.userName == 'q215613905' || matrix.userName == 'takagen99' || matrix.userName == 'FongMi' || matrix.userName == 'AoThen') && env.commit && (matrix.repoName != 'TV-APK') }}
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Setup Python
        if: ${{ (matrix.userName == 'FongMi' || matrix.userName == 'AoThen') && env.commit && (matrix.repoName == 'TV') }}
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        if: ${{ (matrix.userName == 'q215613905' || matrix.userName == 'takagen99' || matrix.userName == 'FongMi' || matrix.userName == 'AoThen') && env.commit && (matrix.repoName != 'TV-APK') }}
        run: |
          python -m pip install --upgrade pip
          pip install lxml ujson pyquery requests jsonpath cachetools pycryptodome beautifulsoup4

      - name: Modify pyramid——build.gradle
        if: ${{ env.commit && (matrix.repoName != 'TV-APK') }}
        working-directory: TVBoxOSC
        run: |
          sed -i '/buildPython("D:\/Programs\/Python\/Python38\/python.exe")/d' pyramid/build.gradle || true

      - name: Setup Python local.properties
        if: ${{ env.commit && (matrix.repoName != 'TV-APK') }}
        working-directory: TVBoxOSC
        run: echo "" > local.properties


      - name: Release Apk Sign
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          if [ "${{ matrix.userName }}" != "FongMi" ]; then
            signingConfigs=''
            signingConfig='ICAgICAgICAgICAgaWYgKHByb2plY3QuaGFzUHJvcGVydHkoIlJFTEVBU0VfU1RPUkVfRklMRSIpKSB7XAogICAgICAgICAgICAgICAgc2lnbmluZ0NvbmZpZyA9IHNpZ25pbmdDb25maWdzLm15Q29uZmlnXAogICAgICAgICAgICB9XAo='
            signingConfigs="$(echo "$signingConfigs" |base64 -d )"
            signingConfig="$(echo "$signingConfig" |base64 -d )"
            sed -i -e "/defaultConfig {/i\\$signingConfigs " -e "/debug {/a\\$signingConfig " -e "/release {/a\\$signingConfig " app/build.gradle
          fi
          cp -f ${{ github.workspace }}/.github/workflows/TVBoxOSC.jks app/TVBoxOSC.jks
          if [ "${{ matrix.userName }}" == "FongMi" ]; then
            echo "storeFile=./TVBoxOSC.jks" >> local.properties
            echo "keyAlias=TVBoxOSC" >> local.properties
            echo "storePassword=TVBoxOSC" >> local.properties
          else
            sed -i '$a\RELEASE_STORE_FILE=./TVBoxOSC.jks'     ./gradle.properties
            sed -i '$a\RELEASE_KEY_ALIAS=TVBoxOSC'            ./gradle.properties
            sed -i '$a\RELEASE_STORE_PASSWORD=TVBoxOSC'       ./gradle.properties
            sed -i '$a\RELEASE_KEY_PASSWORD=TVBoxOSC'         ./gradle.properties
          fi

      - uses: actions/setup-java@v4
        if: ${{ matrix.java_ver }}
        with:
          distribution: temurin
          java-version: ${{ matrix.java_ver }}

      - name: Setup Java 11
        if: ${{ env.commit && (matrix.userName == 'FongMi' && matrix.branchName =='kitkat') }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - uses: gradle/actions/setup-gradle@v4
        if: ${{ env.commit }}

      - name: Build With Gradle
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --warning-mode all

      - name: Prepare App
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          rm -rf apk/
          mkdir -p apk/
          find ~ -name "*.apk"
          #*release*.apk
          for file in `find ~ -name "*.apk" -print`; do
            # 获取文件的基本名称
            base=$(basename "$file")
            # 如果文件是 TVBox_ 开头
            if [[ "$base" == TVBox_* ]]; then
              new_base=$(echo "$base" | sed "s/release/${{ matrix.userName }}_${{ matrix.repoName }}_${{ matrix.branchName }}_${{ env.tag }}/")
            else
              new_base="TVBox_${{ matrix.userName }}_${{ matrix.repoName }}_${{ matrix.branchName }}_${{ env.tag }}_$base"
            fi
            # 移动并重命名文件
            mv "$file" "apk/$new_base"
          done
          # mv sourceCode-${{ env.commitS }}.* apk/

# lastCommit=$(grep "${{ matrix.userName }}\/${{ matrix.repoName }}" ${{ github.workspace }}/README.md |grep -o '[a-z0-9]\{40\}')

      - name: Release Note
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |

            if grep -q "${{ matrix.userName }}\/${{ matrix.repoName }}\/tree\/${{ matrix.branchName }}" ${{ github.workspace }}/README.md; then
                lastCommit=$(grep "${{ matrix.userName }}\/${{ matrix.repoName }}\/tree\/${{ matrix.branchName }}" ${{ github.workspace }}/README.md |grep -o '[a-z0-9]\{40\}')
            else
                lastCommit=${{ env.commit }}
            fi

            export LESSCHARSET=utf-8
            echo -e "Credit: [${{ matrix.userName }}](${{ env.upStream }})\nCommit: ${{ env.commit }}\nChangelog:\n\`\`\`" > apk/${{ matrix.userName }}-Release.log

            if [ "${{ env.commit }}" == "${lastCommit}" ]; then
              COMMIT_MESSAGE=$(git log --pretty=format:%B ${{ env.commitS }} -1 |sed -e "s# \{2,\}#\n#g" -e "/^Merge \(pull\|branch\|remote\)/d" -e '/^$/d' |cat -n |sort -k2,2 -k1,1n |uniq -f1 |sort -k1,1n |cut -f2- )
            else
              COMMIT_MESSAGE=$(git log --pretty=format:%B ${{ env.commitS }}...${lastCommit:0:7} |sed -e "s# \{2,\}#\n#g" -e "/^Merge \(pull\|branch\|remote\)/d" -e '/^$/d' |cat -n |sort -k2,2 -k1,1n |uniq -f1 |sort -k1,1n |cut -f2- )
            fi

            echo $COMMIT_MESSAGE

            echo "$COMMIT_MESSAGE" >> apk/${{ matrix.userName }}-Release.log
            echo -e '\n```' >> apk/${{ matrix.userName }}-Release.log

      - name: Upload App To Artifact
        uses: actions/upload-artifact@main
        if: ${{ env.commit }}
        with:
          name: ${{ matrix.userName }}-${{ matrix.repoName }}
          path: |
            TVBoxOSC/apk/*.apk

      - name: Whether Or Not to Publish
        if: ${{ inputs.donotpublish && env.commit }}
        run: |
          echo "commit=" >> $GITHUB_ENV

      - name: Release APP
        uses: softprops/action-gh-release@v2
        if: ${{ env.commit }}
        with:
          name: ${{ env.tagx }}
          tag_name: ${{ env.tagx }}
          body_path: TVBoxOSC/apk/${{ matrix.userName }}-Release.log
          files: |
            TVBoxOSC/apk/*.apk

      - name: Push to main
        if: ${{ env.commit }}
        run: |
          rm -rf TVBoxOSC
          git reset --hard
          sed -i '/url =/d' ./.git/config
          git config --local user.name ${{ secrets.NAME }}
          git config --local user.email ${{ secrets.EMAIL }}
          git remote set-url --add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git pull --rebase
          # sed -i "/${{ matrix.userName }}\/${{ matrix.repoName }}/s#Updated: [a-zA-Z0-9]*#Updated: ${{ env.commit }}#" README.md


          if grep -q "${{ matrix.userName }}\/${{ matrix.repoName }}\/tree\/${{ matrix.branchName }}" ${{ github.workspace }}/README.md; then
              sed -i "/${{ matrix.userName }}\/${{ matrix.repoName }}\/tree\/${{ matrix.branchName }}/s#Updated: [a-zA-Z0-9]*#Updated: ${{ env.commit }}#" README.md
          else
              echo "- [${{ matrix.userName }}/${{ matrix.repoName }}/tree/${{ matrix.branchName }}](https://github.com/${{ matrix.userName }}/${{ matrix.repoName }}/tree/${{ matrix.branchName }}) (Updated: ${{ env.commit }})" >> ${{ github.workspace }}/README.md
          fi

          git add README.md
          git commit -m "${{ matrix.userName }}-${{ matrix.repoName }}-${{ matrix.branchName }} » ${{ env.commit }} update at $(TZ='Asia/Shanghai' date +%Y-%m-%d)"
          #git commit -m "${{ env.commit }}"
          git push -u -f origin main
          #continue-on-error: true 是因为 git commit 会失败也是预期的，这个步骤可以忽略失败。加上这个命令就可以在这个步骤失败的时候，不会影响其他步骤
        continue-on-error: true

      # - name: UPDATE README.md
      #   if: ${{ env.commit }}
      #   run: |
      #     git config --local user.name ${{ secrets.NAME }}
      #     git config --local user.email ${{ secrets.EMAIL }}
      #     sed -i "/${{ matrix.userName }}\/${{ matrix.repoName }}\/tree\/${{ matrix.branchName }}/s#Updated: [a-zA-Z0-9]*#Updated: ${{ env.commit }}#" README.md
      #     git add README.md
      #     git commit -m "${{ matrix.userName }}-${{ matrix.repoName }}-${{ matrix.branchName }} » ${{ env.commit }} update at $(TZ='Asia/Shanghai' date +%Y-%m-%d)"
      #     git push -f "https://${{ secrets.NAME }}:${{ github.token }}@github.com/${{ github.repository }}.git" main
      #  continue-on-error: true       
      

        
  clean:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs
        uses: AoThen/delete-workflow-runs@main
        with:
          retain_days: 3
          keep_minimum_runs: 5

      - name: Delete tags
        uses: AoThen/delete-tags-without-release-action@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - uses: AoThen/delete-older-releases@master
      #   with:
      #     keep_latest: 3
      #     delete_expired_data: 10 # Optional parameters
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
