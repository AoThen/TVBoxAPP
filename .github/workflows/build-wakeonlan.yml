
name: Build-WakeOnLan

on:
  # push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    #   - uses: actions/checkout@v4  # Use the latest version of setup-node
    #     with:
    #         repository: Florianisme/WakeOnLan
    #         # path: my-tools

      - uses: actions/checkout@v4

      - name: Checkout Source Code
        run: |
            git clone --depth 1 https://github.com/AoThen/WakeOnLan AoThen/WakeOnLan
            mv -f AoThen/WakeOnLan/* ./
            rm -rf AoThen/WakeOnLan
            rm -rf wear

      - name: Set up JDK and Gradle
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > app/kt.jksx
          echo "storeFile=app/kt.jksx" > signing.properties
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" >> signing.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> signing.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> signing.properties

      - name: Build With Gradle
        env:
          STORE_FILE: app/kt.jksx
          STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --parallel --max-workers=8 bundlerelease assemblerelease


      - name: Prepare App
        run: |
          mkdir -p ${{ github.workspace }}/TVBox/
          find . -name "*.apk" -exec mv {} ${{ github.workspace }}/TVBox/ \;
          
        #   for file in `find ~ \( -name "*.apk" -o -name "*java*.apk" \) -not -name "*x86*" -print`; do
        #     base=$(basename "$file")
        #     new_base="WakeOnLan_$base"
        #     mv "$file" "TVBox/$new_base"
        #   done

        #   ls TVBox/*.apk


      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WakeOnLan
          path: ${{ github.workspace }}/TVBox/*.apk


